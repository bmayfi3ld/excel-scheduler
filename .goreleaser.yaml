# goreleaser configuration for the Quilt CLI / MCP server.
# Local dry-run: `just release-snapshot`. Real release: push a v* tag (CI).
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: quilt
    main: ./cmd/quilt
    binary: quilt
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: quilt
    ids: [quilt]
    name_template: >-
      quilt_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - readme.md
      - changelog.md
      - docs/content/docs/*.md
      - packaging/live-views/*.html

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
