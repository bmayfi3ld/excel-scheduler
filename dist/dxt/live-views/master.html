<!DOCTYPE html>
<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Master Schedule",
  "schemaVersion": 1,
  "description": "Live master schedule grid — classes × timeslots with assigned cohorts. Day tabs and period columns are built from the timeslot metadata returned by the board tool. Highlights all four rule violations. Refreshes every 30 seconds or on demand.",
  "mcpTools": ["mcp__quilt__board"],
  "mcpServerNames": ["quilt"]
}
</script>
<html>
<head>
<meta charset="UTF-8">
<title>Master Schedule</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: #fff; color: #1a1a1a; padding: 16px; }
h1 { font-size: 16px; font-weight: 500; margin-bottom: 4px; color: #1a1a1a; }
.subtitle { font-size: 12px; color: #888; margin-bottom: 14px; }
.toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.day-btn { padding: 5px 13px; border: 0.5px solid #ccc; border-radius: 8px; background: transparent; color: #444; cursor: pointer; font-size: 12px; }
.day-btn.active { background: #e8f0fe; color: #1a5fb4; border-color: #b4c8f0; font-weight: 500; }
.spacer { flex: 1; }
.refresh-btn { padding: 5px 12px; border: 0.5px solid #ccc; border-radius: 8px; background: transparent; color: #444; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 5px; }
.refresh-btn:hover { background: #f5f5f5; }
.status { font-size: 11px; color: #888; }
.legend { display: flex; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
.leg-sq { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.tbl-wrap { overflow-x: auto; }
table { border-collapse: collapse; min-width: 100%; }
th { font-weight: 500; font-size: 11px; color: #666; padding: 6px 8px; border: 0.5px solid #e0e0e0; background: #f8f8f8; white-space: nowrap; text-align: center; }
th.class-col { text-align: left; min-width: 115px; position: sticky; left: 0; z-index: 2; }
td { padding: 6px 8px; border: 0.5px solid #e8e8e8; text-align: center; min-width: 72px; font-size: 12px; }
td.class-name { text-align: left; font-weight: 500; color: #555; position: sticky; left: 0; background: #fff; z-index: 1; white-space: nowrap; font-size: 12px; border-right: 0.5px solid #d0d0d0; }
td.empty { color: #ccc; }
td.filled { background: #f0f7e8; color: #2d6a0f; }
td.invalid { background: #fef0f0; color: #b91c1c; font-weight: 500; }
td.conflict { background: #fef9ec; color: #92400e; font-weight: 500; }
td.travel { background: #eef2ff; color: #4338ca; font-weight: 500; }
td.blackout { background: #f5f0ff; color: #6d28d9; font-weight: 500; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #ddd; border-top-color: #666; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { color: #b91c1c; font-size: 12px; padding: 16px 0; }
</style>
</head>
<body>
<h1>Master Schedule</h1>
<div class="subtitle" id="subtitle">Loading…</div>
<div class="toolbar">
  <div id="dayBtns" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  <div class="spacer"></div>
  <span class="status" id="statusMsg"></span>
  <button class="refresh-btn" onclick="load()">↻ Refresh</button>
</div>
<div class="legend">
  <span class="leg"><span class="leg-sq" style="background:#7cb94a"></span>assigned</span>
  <span class="leg"><span class="leg-sq" style="background:#f59e0b"></span>conflict</span>
  <span class="leg"><span class="leg-sq" style="background:#ef4444"></span>invalid cohort</span>
  <span class="leg"><span class="leg-sq" style="background:#6366f1"></span>travel</span>
  <span class="leg"><span class="leg-sq" style="background:#8b5cf6"></span>blackout</span>
</div>
<div class="tbl-wrap"><table id="grid"><tr><td style="padding:20px;color:#888">Loading schedule…</td></tr></table></div>

<script>
// Set DB to the path of the .db schedule this view should render.
const DB = window.QUILT_DB || 'schedule.db';

let board = null;       // { grid:{Classes,Timeslots,Cells}, violations:[], timeslots:[{label,day,period}] }
let days = [];          // distinct day labels, in first-seen order
let activeDay = 0;
let violationMap = new Map(); // "class|timeslot" -> rule (highest-priority)

const RULE_CLASS = {
  AllCohorts: 'invalid',
  OneClassAtATime: 'conflict',
  ClassRequiresTravel: 'travel',
  CohortBlacklist: 'blackout',
};
const RULE_MARK = { invalid: '✕', conflict: '⚠', travel: '⇄', blackout: '⛔' };
// Painting precedence when a cell breaks several rules.
const PRIORITY = ['AllCohorts', 'OneClassAtATime', 'ClassRequiresTravel', 'CohortBlacklist'];

function structured(res) {
  return res.structuredContent ?? JSON.parse(res.content[0].text);
}

async function load() {
  document.getElementById('statusMsg').innerHTML = '<span class="spinner"></span>';
  try {
    board = structured(await window.cowork.callMcpTool('mcp__quilt__board', { db: DB }));

    violationMap = new Map();
    (board.violations || []).forEach(v => {
      const key = v.Cell.Class + '|' + v.Cell.Timeslot;
      const prev = violationMap.get(key);
      if (!prev || PRIORITY.indexOf(v.Rule) < PRIORITY.indexOf(prev)) {
        violationMap.set(key, v.Rule);
      }
    });

    // Build day list from timeslot metadata (no index math).
    days = [];
    (board.timeslots || []).forEach(t => {
      const d = t.day || 'Schedule';
      if (!days.includes(d)) days.push(d);
    });
    if (activeDay >= days.length) activeDay = 0;

    const nViol = (board.violations || []).length;
    document.getElementById('subtitle').textContent =
      `${board.grid.Classes.length} classes · ${board.grid.Timeslots.length} timeslots · ${nViol} violation${nViol !== 1 ? 's' : ''}`;
    document.getElementById('statusMsg').textContent = 'Updated ' + new Date().toLocaleTimeString();
    buildDayButtons();
    render();
  } catch (e) {
    document.getElementById('grid').innerHTML = `<tr><td class="error-msg">Error loading schedule: ${e.message}</td></tr>`;
    document.getElementById('statusMsg').textContent = 'Error';
  }
}

function cellClassAndMark(cls, tsLabel, val) {
  if (!val) return ['empty', ''];
  const rule = violationMap.get(cls + '|' + tsLabel);
  if (rule && RULE_CLASS[rule]) {
    const c = RULE_CLASS[rule];
    return [c, val + ' ' + RULE_MARK[c]];
  }
  return ['filled', val];
}

function render() {
  if (!board) return;
  const { Classes, Timeslots, Cells } = board.grid;
  const dayLabel = days[activeDay];

  // Columns for the active day = timeslot indexes whose metadata day matches.
  const cols = [];
  (board.timeslots || []).forEach((t, i) => {
    if ((t.day || 'Schedule') === dayLabel) cols.push({ i, header: t.period || t.label });
  });

  let html = '<thead><tr><th class="class-col">Class</th>' +
    cols.map(c => `<th>${c.header}</th>`).join('') + '</tr></thead><tbody>';

  Classes.forEach((cls, ci) => {
    html += `<tr><td class="class-name">${cls}</td>`;
    cols.forEach(c => {
      const val = Cells[ci][c.i];
      const [tdClass, display] = cellClassAndMark(cls, Timeslots[c.i], val);
      html += `<td class="${tdClass}">${display}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  document.getElementById('grid').innerHTML = html;
}

function buildDayButtons() {
  const wrap = document.getElementById('dayBtns');
  wrap.innerHTML = '';
  days.forEach((d, i) => {
    const b = document.createElement('button');
    b.className = 'day-btn' + (i === activeDay ? ' active' : '');
    b.textContent = d;
    b.onclick = () => { activeDay = i; buildDayButtons(); render(); };
    wrap.appendChild(b);
  });
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
